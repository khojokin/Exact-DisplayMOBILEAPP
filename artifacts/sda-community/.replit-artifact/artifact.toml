kind = "mobile"
previewPath = "/"
title = "SDA Community"
version = "1.0.0"
id = "artifacts/sda-community"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 8080

[services.development]
run = "pnpm --filter @workspace/sda-community run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sda-community", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sda-community", "run", "serve" ]

[services.env]
PORT = "8080"
BASE_PATH = "/"
